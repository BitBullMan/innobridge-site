<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Detail - Innobridge Blacklist</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Firebase removed: public access with rate limiting -->
    <style>
        :root {
            --bg: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f7f8fa;
            --bg-input: #f7f8fa;
            --surface-2: #eef0f4;
            --surface-3: #e2e5eb;
            --border: rgba(0,0,0,0.06);
            --border2: rgba(0,200,150,0.18);
            --text: #1a1d23;
            --text-2: #5a5f6b;
            --text-3: #8b909c;
            --blue: #00c896;
            --green: #00c896;
            --red: #ef4444;
            --orange: #f59e0b;
            --teal: #0891b2;
            --accent: #00c896;
            --accent-hover: #00b386;
            --r: 20px;
            --r-sm: 12px;
            --font: 'Nunito', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font); background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; }

        /* Nav */
        nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
        .logo-icon{width:38px;height:38px;background:#00c896;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:800}
        .logo-text{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
        .nav-links{display:flex;gap:24px;list-style:none}
        .nav-links a{font-size:14px;font-weight:600;color:var(--text-2);transition:color .2s;text-decoration:none}
        .nav-links a:hover,.nav-links a.active{color:#00c896}
        .mobile-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text)}
        .lang-toggle{font-size:12px;font-weight:700;color:#00c896;background:rgba(0,200,150,0.08);border:1.5px solid rgba(0,200,150,0.18);padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
        .lang-toggle:hover{background:#00c896;color:#fff}

        /* Main Content */
        .main { max-width:900px; margin:0 auto; padding:100px 24px 64px; }

        /* Search Bar */
        .search-wrap { display:flex; background:#fff; border:1.5px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s; margin-bottom:12px; }
        .search-wrap:focus-within { border-color:#00c896; }
        .search-wrap input { flex:1; padding:12px 16px; border:none; outline:none; font-size:14px; font-family:monospace; background:transparent; }
        .search-wrap input::placeholder { color:#bbb; }
        .search-wrap button { background:#00c896; color:#fff; border:none; padding:0 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
        .search-wrap button:hover { opacity:.9; }
        .query-badge { display:none; align-items:center; gap:4px; margin-bottom:20px; padding:3px 10px; background:#eafbef; border-radius:20px; font-size:11px; color:var(--green); font-weight:600; width:fit-content; }

        /* Address Header */
        .addr-header { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .chain-badge { display:inline-block; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase; }
        .chain-badge.eth { background:#eef0f4; color:#5a5f6b; }
        .chain-badge.tron { background:#fff0f0; color:var(--red); }
        .freeze-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; }
        .freeze-badge.frozen { background:#fff0f0; color:var(--red); }
        .freeze-badge.safe { background:#eafbef; color:var(--green); }
        .asset-label { font-size:12px; color:var(--text-3); font-weight:600; }
        .addr-full { font-family:var(--mono); font-size:14px; color:var(--blue); word-break:break-all; margin-bottom:24px; }

        /* Risk Score Gauge */
        .gauge-section { display:grid; grid-template-columns:200px 1fr; gap:16px; margin-bottom:24px; align-items:start; }
        .gauge-container { text-align:center; background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:24px; display:flex; flex-direction:column; align-items:center; }
        .gauge-svg { width:160px; height:100px; margin-bottom:8px; }
        .gauge-label { font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.3px; font-weight:600; margin-bottom:2px; }
        .gauge-score { font-size:36px; font-weight:800; letter-spacing:-1px; color:var(--text); }
        .gauge-desc { font-size:13px; font-weight:700; margin-top:2px; }
        .gauge-desc.severe { color:var(--red); }
        .gauge-desc.high { color:var(--orange); }
        .gauge-desc.medium { color:var(--orange); }
        .gauge-desc.low { color:var(--green); }

        .risk-note-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:20px; }
        .note-label { font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.3px; font-weight:600; margin-bottom:4px; }
        .note-text { font-size:14px; color:var(--text-2); line-height:1.6; }

        /* Cards */
        .card { background:#fff; border:1px solid var(--border); border-radius:var(--r); margin-bottom:20px; overflow:hidden; }
        .card-title { padding:14px 20px; font-size:14px; font-weight:700; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; color:var(--text); }
        .card-body { padding:0; }

        /* Info Rows */
        .info-row { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid var(--border); }
        .info-row:last-child { border-bottom:none; }
        .info-label { font-size:13px; color:var(--text-3); }
        .info-value { font-size:14px; font-weight:600; text-align:right; color:var(--text); }
        .info-value.highlight { color:var(--blue); }
        .info-value.red { color:var(--red); }
        .info-value.green { color:var(--green); }

        /* Freeze Sanction Table */
        .freeze-table { width:100%; border-collapse:collapse; }
        .freeze-table th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.3px; background:var(--bg); border-bottom:1px solid var(--border); }
        .freeze-table td { padding:11px 16px; font-size:13px; border-bottom:1px solid var(--border); }
        .freeze-table tr:last-child td { border-bottom:none; }
        .tx-link { color:var(--blue); text-decoration:none; font-family:monospace; font-size:12px; }
        .tx-link:hover { text-decoration:underline; }

        /* Not Found / Empty State */
        .empty-state { text-align:center; padding:60px 20px; background:#fff; border:1px solid var(--border); border-radius:var(--r); }
        .empty-icon { font-size:48px; margin-bottom:16px; }
        .empty-state h2 { font-size:20px; font-weight:700; margin-bottom:8px; color:var(--text); }
        .empty-state p { color:var(--text-2); font-size:14px; max-width:400px; margin:0 auto; }

        /* Loading */
        .loading-state { text-align:center; padding:80px 20px; color:var(--text-3); }
        .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:#00c896; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Footer — using inline styles */

        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:#fff; border-radius:16px; padding:32px; max-width:380px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.12); position:relative; }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:4px; }
        .modal-desc { color:var(--text-2); font-size:13px; margin-bottom:20px; }
        .modal-input { width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; font-size:13px; font-family:inherit; outline:none; margin-bottom:10px; }
        .modal-input:focus { border-color:#00c896; }
        .modal-divider { display:flex; align-items:center; gap:10px; margin:14px 0; color:var(--text-3); font-size:11px; }
        .modal-divider::before, .modal-divider::after { content:''; flex:1; height:1px; background:var(--border); }
        .btn-google { width:100%; padding:10px; background:#fff; color:#333; border:1px solid var(--border); border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; }
        .btn-google:hover { background:var(--bg); }
        .modal-close { position:absolute; top:12px; right:14px; background:none; border:none; color:var(--text-3); font-size:20px; cursor:pointer; }

        @media (max-width:768px) {
            .gauge-section { grid-template-columns:1fr; }
            .nav-links { display:none; }
            .mobile-toggle{display:block}
        }
    </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">IB</div>
    <span class="logo-text">Innobridge</span>
  </a>
  <div style="display:flex;align-items:center;gap:28px">
    <ul class="nav-links">
      <li><a href="index.html#blacklist-section" data-i18n="nav.blacklist">Blacklist Data</a></li>
      <li><a href="index.html#news" data-i18n="nav.news">News</a></li>
      <li><a href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a></li>
      <li><a href="index.html#platform" data-i18n="nav.services">Services</a></li>
      <li><a href="index.html#law-enforcement" data-i18n="nav.law">Law Enforcement</a></li>
      <li><a href="index.html#contact" data-i18n="nav.contact">Contact</a></li>
    </ul>
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn">EN | 中</button>
    <button class="mobile-toggle" onclick="document.querySelector('.nav-links').style.display=document.querySelector('.nav-links').style.display==='flex'?'none':'flex'" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<div class="main">
    <!-- Search -->
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search by address (0x... or T...)" data-i18n-ph="search.ph" spellcheck="false">
        <button onclick="doSearch()" data-i18n="search.btn">Search</button>
    </div>
    <div class="query-badge" id="queryBadge" style="display:none;">
        <span id="queryText"></span>
    </div>

    <!-- Content Area -->
    <div id="content">
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <div>Looking up address...</div>
        </div>
    </div>
</div>

<footer style="padding:24px 40px;display:flex;align-items:center;justify-content:space-between;background:#1a1d23">
  <span style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600" data-i18n="ft.copy">&copy; 2026 Innobridge. All rights reserved.</span>
  <ul style="display:flex;gap:20px;list-style:none">
    <li><a href="privacy.html" style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600" data-i18n="ft.privacy">Privacy</a></li>
    <li><a href="terms.html" style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600" data-i18n="ft.terms">Terms</a></li>
    <li><a href="disclaimer.html" style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600" data-i18n="ft.disclaimer">Disclaimer</a></li>
  </ul>
</footer>


<script>
const GAS_BASE = 'https://hbfdelixtwkegxpmfyea.supabase.co/functions/v1/aml-api';

// ============================================
// JSONP
// ============================================
let _jcnt = 0;
function jsonpFetch(url) {
    return new Promise(function(resolve, reject) {
        const cb = '_ib_cb_' + (++_jcnt) + '_' + Date.now();
        const t = setTimeout(function() { delete window[cb]; reject(new Error('Timeout')); }, 15000);
        window[cb] = function(d) { clearTimeout(t); delete window[cb]; resolve(d); };
        const s = document.createElement('script');
        s.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + cb;
        s.onerror = function() { clearTimeout(t); delete window[cb]; reject(new Error('Load error')); };
        document.head.appendChild(s);
        s.onload = function() { document.head.removeChild(s); };
    });
}

function buildApiUrl(params) {
    return GAS_BASE + '?' + params;
}

// ============================================
// Search
// ============================================
function doSearch() {
    var addr = document.getElementById('searchInput').value.trim();
    if (!addr) return;
    // Update URL without reload for bookmarkability
    history.pushState(null, '', 'detail.html?address=' + encodeURIComponent(addr));
    loadAddress(addr);
}
document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
});

function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

// ============================================
// SVG Gauge
// ============================================
function buildGaugeSVG(score) {
    score = Math.max(0, Math.min(100, parseInt(score) || 0));
    var cx = 80, cy = 85, r = 65;
    function polar(angle) { return { x: cx + r * Math.cos(angle), y: cy - r * Math.sin(angle) }; }
    var bgStart = polar(Math.PI);
    var bgEnd = polar(0);
    var scoreAngle = Math.PI - (score / 100) * Math.PI;
    var scoreEnd = polar(scoreAngle);
    var largeArc = score > 50 ? 1 : 0;
    return '<svg viewBox="0 0 160 100" class="gauge-svg">' +
        '<defs><linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">' +
        '<stop offset="0%" stop-color="#34c759"/><stop offset="40%" stop-color="#ff9500"/>' +
        '<stop offset="70%" stop-color="#ff9500"/><stop offset="100%" stop-color="#ff3b30"/>' +
        '</linearGradient></defs>' +
        '<path d="M ' + bgStart.x + ' ' + bgStart.y + ' A ' + r + ' ' + r + ' 0 1 1 ' + bgEnd.x + ' ' + bgEnd.y + '" fill="none" stroke="#e8e8e8" stroke-width="10" stroke-linecap="round"/>' +
        (score > 0 ? '<path d="M ' + bgStart.x + ' ' + bgStart.y + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + scoreEnd.x + ' ' + scoreEnd.y + '" fill="none" stroke="url(#gaugeGrad)" stroke-width="10" stroke-linecap="round"/>' : '') +
        '<circle cx="' + scoreEnd.x + '" cy="' + scoreEnd.y + '" r="5" fill="' + (score >= 60 ? '#ff3b30' : score >= 40 ? '#ff9500' : '#34c759') + '"/>' +
        '</svg>';
}

function getRiskDesc(score) {
    score = parseInt(score) || 0;
    if (score >= 80) return { text: 'Severe Risk', cls: 'severe' };
    if (score >= 60) return { text: 'High Risk', cls: 'high' };
    if (score >= 40) return { text: 'Medium Risk', cls: 'medium' };
    return { text: 'Low Risk', cls: 'low' };
}

function fmtAmount(n) {
    if (!n || n === '0' || n === '') return '--';
    return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 });
}

function explorerLink(chain, addr) {
    if ((chain || '').toUpperCase() === 'TRON' || (addr && addr.startsWith('T'))) return 'https://tronscan.org/#/address/' + addr;
    return 'https://etherscan.io/address/' + addr;
}

function txExplorerLink(chain, hash) {
    if (!hash) return '#';
    if ((chain || '').toUpperCase() === 'TRON') return 'https://tronscan.org/#/transaction/' + hash;
    return 'https://etherscan.io/tx/' + hash;
}

function shortHash(h) {
    if (!h || h.length < 16) return h || '--';
    return h.substring(0, 10) + '...' + h.substring(h.length - 6);
}

// ============================================
// Render: Rate Limited
// ============================================
function renderRateLimited(retryAfter) {
    var html = '<div class="empty-state">';
    html += '<div class="empty-icon">&#9203;</div>';
    html += '<h2>Too Many Requests</h2>';
    html += '<p>Please wait ' + (retryAfter || 60) + ' seconds before trying again.</p>';
    html += '<div style="margin-top:20px;">';
    html += '<a href="/" class="btn btn-fill" style="text-decoration:none;padding:8px 24px;font-size:13px;">Back to Dashboard</a>';
    html += '</div></div>';
    document.getElementById('content').innerHTML = html;
}

// ============================================
// Render: Found
// ============================================
function renderFound(data) {
    var r = data.results[0];
    var chain = (r.chain || '').toUpperCase();
    var chainClass = chain === 'TRON' ? 'tron' : 'eth';
    var chainLabel = chain === 'TRON' ? 'TRON' : 'Ethereum';
    var asset = (r.asset || 'USDT').toUpperCase();
    var score = parseInt(r.risk_score) || 95;
    var riskInfo = getRiskDesc(score);
    // 智能处理 frozen_amount：检测是否为未除decimals的原始值
    var faVal = Number(r.frozen_amount) || 0;
    // USDT/USDC 最大冻结额不可能超过10亿，超过的一定是未除10^6的原始值
    if (faVal > 1000000000) faVal = faVal / 1000000;
    // 如果 frozen_amount 为0，尝试从 display 解析
    if (!faVal && r.frozen_amount_display) {
      var dpStr = (r.frozen_amount_display + '').replace(/[^0-9.]/g, '');
      var dp = Number(dpStr);
      if (!isNaN(dp) && dp > 0) {
        if (dp > 1000000000) dp = dp / 1000000;
        faVal = dp;
      }
    }
    var frozenAmt = faVal > 0 ? fmtAmount(faVal) : '--';
    var addr = r.address || data.address;

    // Update remaining queries display
    if (typeof data.remaining !== 'undefined') {
        document.getElementById('queryText').textContent = data.remaining + ' Queries Remaining Today';
    }

    var html = '';
    html += '<div class="addr-header">';
    html += '<span class="chain-badge ' + chainClass + '">' + chainLabel + '</span>';
    html += '<span class="freeze-badge frozen">&#128274; Frozen</span>';
    html += '<span class="asset-label">' + asset + '</span>';
    html += '</div>';
    html += '<div class="addr-full">' + addr + '</div>';

    html += '<div class="gauge-section">';
    html += '<div class="gauge-container">';
    html += buildGaugeSVG(score);
    html += '<div class="gauge-label">Risk Score</div>';
    html += '<div class="gauge-score">' + score + '</div>';
    html += '<div class="gauge-desc ' + riskInfo.cls + '">' + riskInfo.text + '</div>';
    html += '</div>';

    html += '<div class="risk-note-card">';
    html += '<div class="note-label">Risk Assessment</div>';
    html += '<div class="note-text" style="margin-bottom:14px;">This address has been <strong style="color:var(--red);">blacklisted by the token issuer</strong> (' + asset + '). Funds at this address are permanently frozen and cannot be transferred.</div>';
    html += '<div class="note-label">Category</div>';
    html += '<div class="note-text">' + (r.category || r.label || 'Issuer Blacklist') + '</div>';
    if (r.description) {
        html += '<div class="note-label" style="margin-top:14px;">Description</div>';
        html += '<div class="note-text">' + r.description + '</div>';
    }
    html += '</div></div>';

    html += '<div class="card">';
    html += '<div class="card-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg> Overview</div>';
    html += '<div class="card-body">';

    var rows = [
        ['Frozen Balance', frozenAmt !== '--' ? frozenAmt + ' ' + asset : 'Unknown', frozenAmt !== '--' ? 'red' : ''],
        ['Chain', chainLabel, ''],
        ['Asset', asset, ''],
        ['Source', r.source || 'On-Chain / Issuer', ''],
        ['First Seen', r.firstseen || r.firstSeen || r.added_date || r.date_added || '--', 'highlight'],
        ['Date Added', r.added_date || r.date_added || '--', ''],
        ['Status', (r.status || 'active').toUpperCase(), r.status === 'active' ? 'red' : 'green'],
        ['Block Number', r.blocknumber || r.blockNumber || '--', ''],
    ];
    for (var i = 0; i < rows.length; i++) {
        var cls = rows[i][2] ? ' ' + rows[i][2] : '';
        html += '<div class="info-row"><div class="info-label">' + rows[i][0] + '</div><div class="info-value' + cls + '">' + rows[i][1] + '</div></div>';
    }
    html += '</div></div>';

    var txHash = r.txhash || r.txHash || '';
    html += '<div class="card">';
    html += '<div class="card-title"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg> Freeze Sanction</div>';
    html += '<div class="card-body" style="overflow-x:auto;">';
    html += '<table class="freeze-table"><thead><tr><th>Type</th><th>Operation Time</th><th>Amount</th><th>Chain</th><th>TxHash</th></tr></thead><tbody>';
    html += '<tr>';
    html += '<td><span style="color:var(--red); font-weight:600;">Freeze</span></td>';
    html += '<td>' + (r.firstseen || r.firstSeen || r.added_date || '--') + '</td>';
    html += '<td style="color:var(--red); font-weight:600;">' + frozenAmt + (frozenAmt !== '--' ? ' ' + asset : '') + '</td>';
    html += '<td>' + chainLabel + '</td>';
    html += txHash ? '<td><a class="tx-link" href="' + txExplorerLink(chain, txHash) + '" target="_blank" rel="noopener">' + shortHash(txHash) + '</a></td>' : '<td style="color:var(--text-3);">--</td>';
    html += '</tr></tbody></table></div></div>';

    html += '<div style="text-align:center; margin-top:20px;">';
    html += '<a href="' + explorerLink(chain, addr) + '" target="_blank" rel="noopener" class="btn btn-outline" style="text-decoration:none;">View on ' + (chain === 'TRON' ? 'Tronscan' : 'Etherscan') + ' &rarr;</a>';
    html += '</div>';

    document.getElementById('content').innerHTML = html;
}

// ============================================
// Render: Not Found
// ============================================
function renderNotFound(address, data) {
    if (typeof data.remaining !== 'undefined') {
        document.getElementById('queryText').textContent = data.remaining + ' Queries Remaining Today';
    }
    var html = '<div class="empty-state">';
    html += '<div class="empty-icon">&#9989;</div>';
    html += '<h2>Not Found in Blacklist Database</h2>';
    html += '<p style="font-family:monospace; color:var(--blue); margin:12px auto; word-break:break-all; font-size:13px;">' + address + '</p>';
    html += '<p>This address is not currently flagged in our stablecoin blacklist database. This does not guarantee the address is safe.</p>';
    html += '<div style="margin-top:20px;"><a href="/" class="btn btn-fill" style="text-decoration:none;">Back to Dashboard</a></div>';
    html += '</div>';
    document.getElementById('content').innerHTML = html;
}

// ============================================
// Render: Error
// ============================================
function renderError(msg) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon" style="color:var(--red);">&#9888;</div><h2>Error</h2><p>' + msg + '</p></div>';
}

// ============================================
// Load Address (with auth token)
// ============================================
async function loadAddress(address) {
    document.getElementById('searchInput').value = address;
    document.getElementById('content').innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Looking up address...</div></div>';

    try {
        var url = buildApiUrl('address=' + encodeURIComponent(address));
        var data = await jsonpFetch(url);

        if (data && data.error === 'RATE_LIMITED') {
            renderRateLimited(data.retryAfter);
            return;
        }
        if (data && data.success) {
            if (data.found && data.results && data.results.length > 0) {
                renderFound(data);
            } else {
                renderNotFound(address, data);
            }
        } else {
            renderError('Failed to query database. ' + (data && data.message ? data.message : 'Please try again.'));
        }
    } catch (err) {
        renderError('Network error: ' + err.message);
    }
}

// ============================================
// Init — load address directly, no auth needed
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    var address = getQueryParam('address');
    if (address) {
        document.getElementById('searchInput').value = address;
        loadAddress(address);
    } else {
        document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">&#128269;</div><h2>Enter an Address</h2><p>Use the search bar above to look up any Ethereum or Tron address in the blacklist database.</p></div>';
    }
});

  en: {
    'nav.blacklist':'Blacklist Data','nav.news':'News','nav.dashboard':'Dashboard','nav.services':'Services','nav.law':'Law Enforcement','nav.contact':'Contact',
    'search.btn':'Search','search.ph':'Search by address (0x... or T...)',
    'ft.copy':'© 2026 Innobridge. All rights reserved.','ft.privacy':'Privacy','ft.terms':'Terms','ft.disclaimer':'Disclaimer'
  },
  cn: {
    'nav.blacklist':'黑名单数据','nav.news':'新闻','nav.dashboard':'数据面板','nav.services':'服务','nav.law':'执法协助','nav.contact':'联系我们',
    'search.btn':'搜索','search.ph':'输入地址搜索 (0x... 或 T...)',
    'ft.copy':'© 2026 Innobridge. 版权所有。','ft.privacy':'隐私政策','ft.terms':'服务条款','ft.disclaimer':'免责声明'
  }
};
var currentLang = localStorage.getItem('ib_lang') || 'en';
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('ib_lang', lang);
  var dict = I18N[lang] || I18N.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-ph');
    if (dict[key] !== undefined) el.placeholder = dict[key];
  });
  var btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = lang === 'en' ? 'EN | 中' : '中 | EN';
}
function toggleLang() { applyLang(currentLang === 'en' ? 'cn' : 'en'); }
applyLang(currentLang);
</script>
